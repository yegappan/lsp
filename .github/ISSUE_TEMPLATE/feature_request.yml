name: "✨ Feature Request"
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried.

  - type: textarea
    id: example
    attributes:
      label: Example usage (Vim9script)
      render: vim
      value: |
        vim9script

        # example usage here

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.
