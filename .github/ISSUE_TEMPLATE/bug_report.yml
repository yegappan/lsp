name: Bug Report
description: File a report to help us improve the LSP plugin
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Before submitting, please ensure:
        - You are using **Vim 9.0+** (with Vim9script support)
        - You have tested with a minimal configuration
        - You have reproduced the issue with the **latest plugin commit**

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: input
    id: vim_version
    attributes:
      label: Vim Version
      description: Output of `:version` (or `vim --version`)
      placeholder: e.g. Vim 9.1.1700
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Include version if relevant
      placeholder: e.g. macOS 14.4, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Commit Hash
      description: Git commit hash of the plugin version you are using.
      placeholder: e.g. 4f2a1c9

  - type: input
    id: lsp_server
    attributes:
      label: Language Server
      description: Which LSP server were you using? (e.g. gopls, rust-analyzer, clangd)
    validations:
      required: true

  - type: input
    id: lsp_server_version
    attributes:
      label: Language Server Version
      description: Version of the LSP server.
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: minimal_config
    attributes:
      label: Minimal Vim Configuration
      description: Provide the smallest possible Vim9script config that reproduces the issue.
      placeholder: |
        vim9script
        syntax on
        filetype plugin indent on
        set packpath+=~/.vim
        packadd lsp
        # your minimal settings here
      render: vim

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps to reproduce the issue.
      placeholder: |
        1. vim -u min_init.vim
        2. Open file...
        3. Trigger LSP action...
        4. ...
      render: text
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Include relevant output from:
        - :messages
        - LSP logs (if available)
        - Any error messages
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Final Checklist
      options:
        - label: I have verified this issue persists with a minimal configuration.
        - label: I am using the latest version of the plugin.
        - label: I am using a supported Vim version (9.0+).
